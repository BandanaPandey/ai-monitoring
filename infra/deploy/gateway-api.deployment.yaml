apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: ghcr.io/example/ai-monitoring-gateway-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: GATEWAY_STORAGE_BACKEND
              value: clickhouse
            - name: GATEWAY_CLICKHOUSE_DSN
              value: clickhouse://default:@clickhouse:8123/default
            - name: GATEWAY_POSTGRES_DSN
              value: postgresql://postgres:postgres@postgres:5432/aimonitor
            - name: GATEWAY_DEFAULT_WORKSPACE_ID
              value: workspace-default
            - name: GATEWAY_DEFAULT_WORKSPACE_NAME
              value: Default Workspace
            - name: GATEWAY_DEFAULT_WORKSPACE_SLUG
              value: default-workspace
            - name: GATEWAY_DEFAULT_USER_ID
              value: user-admin
            - name: GATEWAY_AUTH_EMAIL
              value: admin@example.com
            - name: GATEWAY_AUTH_PASSWORD
              value: changeme
            - name: GATEWAY_AUTH_SECRET
              value: local-dev-secret
            - name: GATEWAY_DEFAULT_API_KEY
              value: demo-ingest-key
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
