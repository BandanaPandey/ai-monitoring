apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: ghcr.io/example/ai-monitoring-processor:latest
          env:
            - name: PROCESSOR_MODE
              value: clickhouse
            - name: PROCESSOR_CLICKHOUSE_DSN
              value: clickhouse://default:@clickhouse:8123/default
            - name: PROCESSOR_POSTGRES_DSN
              value: postgresql://postgres:postgres@postgres:5432/aimonitor
