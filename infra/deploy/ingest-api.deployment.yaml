apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest-api
  template:
    metadata:
      labels:
        app: ingest-api
    spec:
      containers:
        - name: ingest-api
          image: ghcr.io/example/ai-monitoring-ingest-api:latest
          ports:
            - containerPort: 8001
          env:
            - name: INGEST_STORAGE_BACKEND
              value: clickhouse
            - name: INGEST_CLICKHOUSE_DSN
              value: clickhouse://default:@clickhouse:8123/default
            - name: INGEST_POSTGRES_DSN
              value: postgresql://postgres:postgres@postgres:5432/aimonitor
            - name: INGEST_DEFAULT_WORKSPACE_ID
              value: workspace-default
            - name: INGEST_DEFAULT_WORKSPACE_NAME
              value: Default Workspace
            - name: INGEST_DEFAULT_WORKSPACE_SLUG
              value: default-workspace
            - name: INGEST_DEFAULT_USER_ID
              value: user-admin
            - name: INGEST_DEFAULT_USER_EMAIL
              value: admin@example.com
            - name: INGEST_DEFAULT_USER_PASSWORD
              value: changeme
            - name: INGEST_DEFAULT_API_KEY
              value: demo-ingest-key
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
