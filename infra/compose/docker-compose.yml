services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aimonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  ingest-api:
    build:
      context: ../..
      dockerfile: services/ingest-api/Dockerfile
    environment:
      INGEST_STORAGE_BACKEND: clickhouse
      INGEST_CLICKHOUSE_DSN: clickhouse://default:@clickhouse:8123/default
      INGEST_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/aimonitor
      INGEST_DEFAULT_WORKSPACE_ID: workspace-default
      INGEST_DEFAULT_WORKSPACE_NAME: Default Workspace
      INGEST_DEFAULT_WORKSPACE_SLUG: default-workspace
      INGEST_DEFAULT_USER_ID: user-admin
      INGEST_DEFAULT_USER_EMAIL: admin@example.com
      INGEST_DEFAULT_USER_PASSWORD: changeme
      INGEST_DEFAULT_API_KEY: demo-ingest-key
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - clickhouse

  gateway-api:
    build:
      context: ../..
      dockerfile: services/gateway-api/Dockerfile
    environment:
      GATEWAY_STORAGE_BACKEND: clickhouse
      GATEWAY_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/aimonitor
      GATEWAY_CLICKHOUSE_DSN: clickhouse://default:@clickhouse:8123/default
      GATEWAY_DEFAULT_WORKSPACE_ID: workspace-default
      GATEWAY_DEFAULT_WORKSPACE_NAME: Default Workspace
      GATEWAY_DEFAULT_WORKSPACE_SLUG: default-workspace
      GATEWAY_DEFAULT_USER_ID: user-admin
      GATEWAY_AUTH_EMAIL: admin@example.com
      GATEWAY_AUTH_PASSWORD: changeme
      GATEWAY_AUTH_SECRET: local-dev-secret
      GATEWAY_DEFAULT_API_KEY: demo-ingest-key
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - clickhouse

  processor:
    build:
      context: ../..
      dockerfile: services/processor/Dockerfile
    environment:
      PROCESSOR_MODE: clickhouse
      PROCESSOR_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/aimonitor
      PROCESSOR_CLICKHOUSE_DSN: clickhouse://default:@clickhouse:8123/default
    depends_on:
      - ingest-api

  web:
    build:
      context: ../..
      dockerfile: services/web/Dockerfile
    environment:
      VITE_GATEWAY_API_URL: http://gateway-api:8000
    ports:
      - "5173:5173"
    depends_on:
      - gateway-api

volumes:
  postgres-data:
  clickhouse-data:
