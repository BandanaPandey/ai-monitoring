[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-monitoring-sdk"
version = "0.1.0"
description = "Python SDK for AI monitoring ingestion."
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27,<1.0",
  "ai-monitoring-contracts>=0.1.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2,<9.0"
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_monitoring_sdk*"]

