[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-monitoring-contracts"
version = "0.1.0"
description = "Shared schemas and contracts for the AI monitoring platform."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7,<3.0"
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_monitoring_contracts*"]

